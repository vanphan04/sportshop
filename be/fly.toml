# fly.toml app configuration file generated for sportshop on 2026-04-17T09:45:53Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'sportshop'
primary_region = 'iad'

[build]
  builder = "paketobuildpacks/builder:base"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1